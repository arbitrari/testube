<h2 mat-dialog-title>Application Settings</h2>
<mat-dialog-content>
  <h3>Theme</h3>
  <p>Choose your preferred color theme</p>
  <mat-radio-group [ngModel]="selectedTheme" (ngModelChange)="onThemeChange($event)" class="theme-radio-group">
    <mat-radio-button value="light">Light</mat-radio-button>
    <mat-radio-button value="dark">Dark</mat-radio-button>
    <mat-radio-button value="system">System</mat-radio-button>
  </mat-radio-group>

  <h3>Source Visibility</h3>
  <p>Hide sources that are not relevant to you</p>
  @if (sourceList?.selectedOptions?.selected?.length < sourceList?.options?.length) {
    <button mat-stroked-button class="reset-button" (click)="sourceList.selectAll()">Reset</button>
  }
  <div class="source-container">
    <mat-selection-list #sourceList [multiple]="true">
      @for (pair of DEFAULT_SOURCES; track pair[0]) {
        <mat-list-option [value]="pair[0]" [selected]="sourceManager.hiddenData().has(pair[0]) == false">{{pair[1].name}}</mat-list-option>
      }
    </mat-selection-list>
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button [mat-dialog-close]="true" (click)="onSave()">Save</button>
  <button mat-button mat-dialog-close>Cancel</button>
</mat-dialog-actions>
